<app-nav-bar class="fade layout-nav" [class.show]="navReady"></app-nav-bar>

<div class="layout-shell" [class.layout-shell--rtl]="languageService.isRtl" [class.layout-shell--ltr]="!languageService.isRtl">
  <div
    class="layout-main"
    [class.layout-main--rtl]="languageService.isRtl"
    [class.layout-main--ltr]="!languageService.isRtl"
    [attr.dir]="languageService.direction">
    <app-side-bar
      *ngIf="settingsService.isSideBarOpen"
      id="sidebar"
      class="layout-sidebar bg-dark-color2"
      [attr.dir]="languageService.direction"></app-side-bar>

    <div class="layout-content bg-dark text-light" [attr.dir]="languageService.direction">
      <div class="fade route-stage" [class.show]="routeReady">
        <router-outlet></router-outlet>
      </div>
    </div>
  </div>
</div>
